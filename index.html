<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation Initiation Cluny - Sonrisa de Baile</title>
    <meta name="description"
        content="Formulaire de réservation pour les cours d'initiation à la danse à Cluny - Sonrisa de Baile">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <div class="form-card">
            <!-- Header -->
            <div class="form-header">
                <img src="logo.png" alt="Sonrisa de Baile" class="header-logo">
                <h1>RESERVATION INITIATION Cluny</h1>
            </div>

            <!-- Form -->
            <form id="registrationForm" class="form-body" novalidate>
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required
                            autocomplete="family-name">
                    </div>
                    <span class="error-message" id="nom-error"></span>
                </div>

                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom" required
                            autocomplete="given-name">
                    </div>
                    <span class="error-message" id="prenom-error"></span>
                </div>

                <div class="form-group">
                    <label for="whatsapp">Déjà Inscrit sur Whatsapp</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                        </svg>
                        <select id="whatsapp" name="whatsapp" required>
                            <option value="" disabled selected>Déjà inscrit sur Whatsapp ?</option>
                            <option value="OUI">OUI</option>
                            <option value="NON">NON</option>
                        </select>
                    </div>
                    <span class="error-message" id="whatsapp-error"></span>
                </div>

                <div class="form-group">
                    <label for="telephone">N° Téléphone</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                        <input type="tel" id="telephone" name="telephone" placeholder="06 XX XX XX XX" required
                            autocomplete="tel">
                    </div>
                    <span class="error-message" id="telephone-error"></span>
                </div>

                <div class="form-group">
                    <label for="activites">Activités</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                            <line x1="9" y1="9" x2="9.01" y2="9" />
                            <line x1="15" y1="9" x2="15.01" y2="9" />
                        </svg>
                        <select id="activites" name="activites" required>
                            <option value="" disabled selected>Choisissez une activité</option>
                            <option value="BACHATA">💃 BACHATA</option>
                            <option value="SALSA">🕺 SALSA</option>
                            <option value="BACHATA + SALSA">💃🕺 BACHATA + SALSA</option>
                        </select>
                    </div>
                    <span class="error-message" id="activites-error"></span>
                </div>

                <div class="form-group">
                    <label for="positionnement">Positionnement</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                        <select id="positionnement" name="positionnement" required>
                            <option value="" disabled selected>Choisissez votre positionnement</option>
                            <option value="FOLLOWER">FOLLOWER</option>
                            <option value="LEADER">LEADER</option>
                        </select>
                    </div>
                    <span class="error-message" id="positionnement-error"></span>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="btn-text">S'INSCRIRE</span>
                    <span class="btn-loader" id="btnLoader">
                        <svg class="spinner" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"
                                stroke-dasharray="31.4 31.4" stroke-linecap="round" />
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Success Message -->
            <div class="success-overlay" id="successOverlay">
                <div class="success-content">
                    <div class="success-icon">✅</div>
                    <h2>Inscription réussie !</h2>
                    <p>Votre réservation a bien été enregistrée.<br>Nous vous contacterons bientôt.</p>
                    <button class="btn-new" id="btnNew">Nouvelle inscription</button>
                </div>
            </div>

            <!-- Error Message -->
            <div class="error-overlay" id="errorOverlay">
                <div class="error-content">
                    <div class="error-icon">❌</div>
                    <h2>Erreur</h2>
                    <p id="errorText">Une erreur est survenue. Veuillez réessayer.</p>
                    <button class="btn-retry" id="btnRetry">Réessayer</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 Sonrisa de Baile — Cluny</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>

</html>
